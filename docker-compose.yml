services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      # Copy remaining vars from your .env file or inject via CI/CD secrets
      - BOLNA_API_KEY=${BOLNA_API_KEY}
      - BOLNA_BASE_URL=${BOLNA_BASE_URL:-https://api.bolna.ai}
      - BOLNA_PHONE_NUMBER=${BOLNA_PHONE_NUMBER}
      - WEBHOOK_BASE_URL=${WEBHOOK_BASE_URL}
      - MAX_CONCURRENT_CALLS=${MAX_CONCURRENT_CALLS:-5}
      - CALL_RETRY_ATTEMPTS=${CALL_RETRY_ATTEMPTS:-2}
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-hinglish}
      - DEFAULT_DEALER_NAME=${DEFAULT_DEALER_NAME}
      - DEFAULT_DEALER_ADDRESS=${DEFAULT_DEALER_ADDRESS}
      - DEFAULT_DEALER_PHONE=${DEFAULT_DEALER_PHONE}
      - TRAI_ENFORCE=${TRAI_ENFORCE:-true}
    volumes:
      - sqlite_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  client:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./client/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server

volumes:
  redis_data:
  sqlite_data:
